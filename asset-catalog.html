<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRAIT OF HORMUZ — Asset Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0a0e14;
    --green: #33ff66;
    --green-dim: rgba(51, 255, 102, 0.15);
    --green-glow: rgba(51, 255, 102, 0.4);
    --amber: #ffb300;
    --red: #ef5350;
    --blue: #42a5f5;
    --blue-dim: rgba(66, 165, 245, 0.15);
    --red-dim: rgba(239, 83, 80, 0.15);
    --text: #c0c8d0;
    --text-dim: #667080;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Black Ops One', cursive;
    --data: 'Orbitron', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanlines overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 3px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ─── HEADER ─── */
  .header {
    background: var(--panel);
    border-bottom: 1px solid var(--green-dim);
    padding: 20px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: var(--display);
    font-size: 28px;
    color: var(--green);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(51,255,102,0.3);
  }
  .header .classification {
    font-size: 11px;
    color: var(--red);
    letter-spacing: 3px;
    opacity: 0.5;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--amber);
    letter-spacing: 1px;
    opacity: 0.7;
  }

  /* ─── FILTER TABS ─── */
  .filters {
    display: flex;
    gap: 4px;
    padding: 0 40px;
    margin-top: -1px;
    background: var(--panel);
    border-bottom: 1px solid var(--green-dim);
    position: sticky;
    top: 82px;
    z-index: 99;
  }
  .filter-tab {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 12px 20px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }
  .filter-tab .count {
    font-size: 10px;
    opacity: 0.5;
    margin-left: 6px;
  }

  /* ─── MAIN CONTENT ─── */
  .content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 30px 40px;
  }

  /* ─── CATEGORY SECTION ─── */
  .category {
    margin-bottom: 50px;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--green-dim);
  }
  .category-header h2 {
    font-family: var(--display);
    font-size: 18px;
    color: var(--green);
    letter-spacing: 1px;
  }
  .category-header .badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 2px;
  }
  .badge-coalition {
    background: var(--blue-dim);
    color: var(--blue);
    border: 1px solid rgba(66,165,245,0.3);
  }
  .badge-irgc {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(239,83,80,0.3);
  }
  .badge-fx {
    background: rgba(255,179,0,0.1);
    color: var(--amber);
    border: 1px solid rgba(255,179,0,0.3);
  }

  /* ─── ASSET ROW ─── */
  .asset-row {
    margin-bottom: 36px;
  }
  .asset-info {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }
  .asset-name {
    font-family: var(--display);
    font-size: 16px;
    color: #e0e0e0;
  }
  .asset-stats {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .asset-stats span {
    margin-right: 16px;
  }
  .asset-stats .stat-val {
    color: var(--amber);
    font-family: var(--data);
  }

  /* ─── VARIANT GRID ─── */
  .variants {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .variants::-webkit-scrollbar { height: 4px; }
  .variants::-webkit-scrollbar-track { background: transparent; }
  .variants::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

  .variant-card {
    flex-shrink: 0;
    width: 200px;
    background: var(--panel);
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .variant-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 3px
    );
    pointer-events: none;
  }
  .variant-card:hover {
    border-color: var(--green-glow);
    box-shadow: 0 0 16px rgba(51,255,102,0.1);
    transform: translateY(-2px);
  }
  .variant-card.selected {
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(51,255,102,0.2);
  }
  .variant-card.selected::after {
    content: '✓ SELECTED';
    position: absolute;
    top: 8px;
    right: 8px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--green);
    background: rgba(0,0,0,0.7);
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    z-index: 2;
  }

  .variant-canvas-wrap {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d1a2a;
    border-bottom: 1px solid var(--green-dim);
    position: relative;
  }
  .variant-canvas-wrap canvas {
    image-rendering: pixelated;
    display: block;
  }

  /* Water background for sea units */
  .variant-canvas-wrap.water {
    background:
      radial-gradient(ellipse at 30% 60%, rgba(21,101,192,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 40%, rgba(21,101,192,0.15) 0%, transparent 50%),
      #0a1628;
  }
  .variant-canvas-wrap.sky {
    background:
      radial-gradient(ellipse at 50% 80%, rgba(21,101,192,0.2) 0%, transparent 60%),
      linear-gradient(180deg, #0d1a30 0%, #0a1222 100%);
  }

  .variant-label {
    padding: 10px 12px;
  }
  .variant-label .name {
    font-size: 13px;
    color: #e0e0e0;
    margin-bottom: 4px;
  }
  .variant-label .desc {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .variant-label .style-tag {
    display: inline-block;
    font-size: 9px;
    color: var(--amber);
    border: 1px solid rgba(255,179,0,0.2);
    padding: 1px 6px;
    border-radius: 2px;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* ─── SELECTION SUMMARY (bottom bar) ─── */
  .summary-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--panel);
    border-top: 1px solid var(--green-dim);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  .summary-bar.visible { transform: translateY(0); }
  .summary-bar .selected-count {
    font-family: var(--data);
    font-size: 14px;
    color: var(--green);
  }
  .summary-bar .selected-list {
    font-size: 12px;
    color: var(--text-dim);
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .summary-bar > div:first-child {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .summary-bar .export-btn {
    flex-shrink: 0;
    font-family: var(--display);
    font-size: 14px;
    color: var(--green);
    background: rgba(51,255,102,0.1);
    border: 1px solid var(--green-glow);
    padding: 8px 24px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .summary-bar .export-btn:hover {
    background: rgba(51,255,102,0.2);
    box-shadow: 0 0 12px rgba(51,255,102,0.2);
  }

  .notes-field {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--green-dim);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    resize: vertical;
    min-height: 48px;
    margin-top: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-field:focus { border-color: var(--green-glow); }
  .notes-field::placeholder { color: var(--text-dim); }

  /* Fade-in animation */
  .category { animation: fadeUp 0.4s ease both; }
  .category:nth-child(2) { animation-delay: 0.05s; }
  .category:nth-child(3) { animation-delay: 0.1s; }
  .category:nth-child(4) { animation-delay: 0.15s; }
  .category:nth-child(5) { animation-delay: 0.2s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .spacer-bottom { height: 80px; }
</style>

function getCtx(canvas, w = 200, h = 140) {
  canvas.width = w * 2;
  canvas.height = h * 2;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  // Paint a subtle grid background so sprites are clearly visible
  ctx.fillStyle = '#0e1e30';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(51, 255, 102, 0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < w; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
  // Crosshair at center
  ctx.strokeStyle = 'rgba(51, 255, 102, 0.08)';
  ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
  return ctx;
}

  const ctx = getCtx(canvas);
  const cx = 100, cy = 70;
  // Angular stealth hull
  ctx.fillStyle = '#607d8b';
  ctx.beginPath();
  ctx.moveTo(cx + 30, cy); // bow point
  ctx.lineTo(cx + 18, cy - 7);
  ctx.lineTo(cx - 8, cy - 8);
  ctx.lineTo(cx - 22, cy - 6);
  ctx.lineTo(cx - 22, cy + 6);
  ctx.lineTo(cx - 8, cy + 8);
  ctx.lineTo(cx + 18, cy + 7);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#b0bec5';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Superstructure
  ctx.fillStyle = '#90a4ae';
  ctx.fillRect(cx - 6, cy - 5, 12, 10);
  ctx.strokeRect(cx - 6, cy - 5, 12, 10);
  // Gun turret
  ctx.fillStyle = '#a0b0bc';
  ctx.beginPath();
  ctx.arc(cx + 14, cy, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(cx + 14, cy - 1, 10, 2);
  // Blue accent
  ctx.strokeStyle = '#42a5f5';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 20, cy - 7);
  ctx.lineTo(cx + 16, cy - 7);
  ctx.stroke();
  // Radar
  ctx.strokeStyle = '#82b1ff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx - 2, cy - 8, 4, -Math.PI * 0.8, -Math.PI * 0.2);

}

  ctx.setLineDash([]);

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';

  ctx.beginPath(); ctx.moveTo(cx - 30, cy - 8); ctx.lineTo(cx - 30, cy + 8); ctx.stroke();

  for (let i = -28; i <= 28; i += 8) { ctx.beginPath(); ctx.arc(cx + i, cy - 14, 1.2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(cx + i, cy + 14, 1.2, 0, Math.PI * 2); ctx.fill(); }

  ctx.fillStyle = 'rgba(33,150,243,0.4)';

  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx + 10, cy);
  ctx.lineTo(cx + 4, cy - 2.5);
  ctx.lineTo(cx - 8, cy - 2);
  ctx.lineTo(cx - 10, cy);
  ctx.lineTo(cx - 8, cy + 2);
  ctx.lineTo(cx + 4, cy + 2.5);
  ctx.closePath();
  ctx.stroke();
  // Trail rings
  for (let i = 0; i < 3; i++) {
    ctx.strokeStyle = `rgba(0,188,212,${0.3 - i * 0.1})`;
    ctx.beginPath(); ctx.arc(cx - 14 - i * 8, cy, 3 - i * 0.5, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.shadowBlur = 0;
}


// ═══════════════════════════════════════════════
//  CATALOG RENDERER
// ═══════════════════════════════════════════════

const selections = {};

function renderCatalog(filter = 'all') {
  const container = document.getElementById('catalog');
  container.innerHTML = '';

  const factions = {
    coalition: { label: 'COALITION FORCES', badge: 'badge-coalition' },
    irgc: { label: 'IRGC FORCES', badge: 'badge-irgc' },
    projectile: { label: 'PROJECTILES', badge: 'badge-fx' },
    effect: { label: 'EFFECTS', badge: 'badge-fx' },
  };

  // Group by faction
  const groups = {};
  ASSETS.forEach(a => {
    if (filter !== 'all' && a.faction !== filter) return;
    if (!groups[a.faction]) groups[a.faction] = [];
    groups[a.faction].push(a);
  });

  Object.entries(groups).forEach(([faction, assets]) => {
    const section = document.createElement('div');
    section.className = 'category';
    section.dataset.faction = faction;

    const f = factions[faction];
    section.innerHTML = `
      <div class="category-header">
        <h2>${f.label}</h2>
        <span class="badge ${f.badge}">${assets.length} UNITS</span>
      </div>
    `;

    assets.forEach(asset => {
      const row = document.createElement('div');
      row.className = 'asset-row';

      const statsHtml = Object.entries(asset.stats)
        .map(([k, v]) => `<span>${k}: <span class="stat-val">${v}</span></span>`)
        .join('');

      row.innerHTML = `
        <div class="asset-info">
          <span class="asset-name">${asset.name}</span>
          <span class="asset-stats">${statsHtml}</span>
        </div>
        <div class="variants" id="variants-${asset.id}"></div>
      `;
      section.appendChild(row);

      // Render variant cards
      const variantsContainer = row.querySelector('.variants');
      asset.variants.forEach((variant, vi) => {
        const card = document.createElement('div');
        card.className = 'variant-card' + (selections[asset.id] === vi ? ' selected' : '');
        card.innerHTML = `
          <div class="variant-canvas-wrap ${asset.env}">
            <canvas></canvas>
          </div>
          <div class="variant-label">
            <div class="name">${variant.name}</div>
            <div class="desc">${variant.desc}</div>
            <span class="style-tag">${variant.style}</span>
          </div>
        `;

        card.addEventListener('click', () => {
          if (selections[asset.id] === vi) {
            delete selections[asset.id];
          } else {
            selections[asset.id] = vi;
          }
          renderCatalog(filter);
          updateSummary();
        });

        variantsContainer.appendChild(card);

        // Draw on the canvas
        const canvas = card.querySelector('canvas');
        variant.draw(canvas);
      });
    });

    container.appendChild(section);
  });

  const spacer = document.createElement('div');
  spacer.className = 'spacer-bottom';
  container.appendChild(spacer);

  // Update counts
  document.getElementById('count-all').textContent = ASSETS.length;
  ['coalition', 'irgc', 'projectile', 'effect'].forEach(f => {
    document.getElementById('count-' + f).textContent = ASSETS.filter(a => a.faction === f).length;
  });
}

function filterCategory(cat) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  event.target.closest('.filter-tab').classList.add('active');
  renderCatalog(cat);
}

function updateSummary() {
  const bar = document.getElementById('summaryBar');
  const count = Object.keys(selections).length;
  document.getElementById('selectedCount').textContent = `${count} SELECTED`;

  const names = Object.entries(selections).map(([id, vi]) => {
    const asset = ASSETS.find(a => a.id === id);
    return `${asset.name}: ${asset.variants[vi].name}`;
  });
  document.getElementById('selectedList').textContent = names.join('  //  ');

  bar.classList.toggle('visible', count > 0);
}

function exportSelections() {
  const lines = Object.entries(selections).map(([id, vi]) => {
    const asset = ASSETS.find(a => a.id === id);
    const v = asset.variants[vi];
    return `${asset.name}: ${v.name} (${v.style}) — ${v.desc}`;
  });
  const text = 'ASSET SELECTIONS\n' + '═'.repeat(40) + '\n' + lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    document.querySelector('.export-btn').textContent = 'COPIED!';
    setTimeout(() => document.querySelector('.export-btn').textContent = 'COPY SELECTIONS', 1500);
  });
}

// Init
renderCatalog();
</script>
</body>

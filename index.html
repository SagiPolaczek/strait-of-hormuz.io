<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Strait of Hormuz Defense</title>
  <meta name="description" content="Command coalition forces in this browser-based tower defense game set in the Strait of Hormuz. Build oil rigs, deploy destroyers, and push tankers through the world's most dangerous waterway.">

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Strait of Hormuz Defense">
  <meta property="og:description" content="Command coalition forces in this browser-based tower defense game. Build oil rigs, deploy destroyers, and push tankers through the world's most dangerous waterway.">
  <meta property="og:image" content="https://strait-of-hormuz.io/og-image.jpg">
  <meta property="og:url" content="https://strait-of-hormuz.io">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Strait of Hormuz Defense">
  <meta name="twitter:description" content="Command coalition forces in this browser-based tower defense game set in the Strait of Hormuz.">
  <meta name="twitter:image" content="https://strait-of-hormuz.io/og-image.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Black+Ops+One&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* ── Upgrade panel — always visible LEFT of the game canvas ── */
    #upgrade-panel {
      width: 270px;
      flex-shrink: 0;
      background: #0a0e14;
      border-right: 1px solid rgba(51, 255, 102, 0.15);
      font-family: 'Share Tech Mono', monospace;
      color: #e0e0e0;
      position: relative;
      overflow: hidden;
    }
    #upgrade-panel .panel-inner {
      width: 270px;
      padding: 18px 16px;
      height: 100vh;
      overflow-y: auto;
      position: relative;
    }
    #upgrade-panel .panel-inner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 3px
      );
    }

    .panel-header {
      font-size: 11px;
      color: #33ff66;
      letter-spacing: 3px;
      margin-bottom: 8px;
      opacity: 0.5;
    }
    .panel-unit-name {
      font-family: 'Black Ops One', cursive;
      font-size: 20px;
      color: #e0e0e0;
      margin-bottom: 6px;
    }
    .panel-hp {
      font-size: 15px;
      color: #90CAF9;
      margin-bottom: 14px;
    }
    .panel-divider {
      border: none;
      border-top: 1px solid rgba(51, 255, 102, 0.15);
      margin: 10px 0;
    }

    .upgrade-row {
      background: rgba(20, 28, 36, 0.85);
      border: 1px solid rgba(51, 255, 102, 0.15);
      border-radius: 5px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .upgrade-row:hover {
      background: rgba(27, 58, 27, 0.6);
      border-color: rgba(51, 255, 102, 0.35);
    }
    .upgrade-row.cant-afford:hover {
      background: rgba(58, 27, 27, 0.5);
      border-color: rgba(239, 83, 80, 0.3);
    }
    .upgrade-row.maxed {
      cursor: default;
      opacity: 0.6;
      border-color: rgba(255, 213, 79, 0.3);
    }
    .upgrade-row.maxed:hover {
      background: rgba(20, 28, 36, 0.85);
    }
    .upgrade-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .upgrade-name { font-size: 16px; font-weight: bold; }
    .upgrade-pips { font-size: 18px; color: #90CAF9; letter-spacing: 3px; }
    .upgrade-pips.maxed { color: #FFD54F; }
    .upgrade-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .upgrade-cost {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: #ffb300;
    }
    .upgrade-cost.cant-afford { color: #ef5350; }
    .upgrade-cost.max-label { color: #FFD54F; font-weight: bold; }
    .upgrade-desc { font-size: 12px; color: #666; }

    /* Enemy intel stats */
    .intel-stat {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .intel-stat-label {
      font-size: 11px;
      color: #777;
      letter-spacing: 1px;
    }
    .intel-stat-value {
      font-size: 13px;
      color: #e0e0e0;
      font-family: 'Orbitron', sans-serif;
    }

    /* ── Game canvas wrapper ── */
    #game-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    canvas {
      display: block;
    }

    /* ── Mobile / tablet responsive ── */
    @media (max-width: 1024px) {
      #app {
        flex-direction: column-reverse;
      }
      #upgrade-panel {
        width: 100%;
        height: auto;
        max-height: 30vh;
        border-right: none;
        border-top: 1px solid rgba(51, 255, 102, 0.15);
      }
      #upgrade-panel .panel-inner {
        width: 100%;
        height: auto;
        max-height: 30vh;
        padding: 12px 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .upgrade-row {
        flex: 1 1 200px;
        margin-bottom: 0;
      }
      .panel-header, .panel-unit-name, .panel-hp {
        width: 100%;
      }
    }

    @media (max-width: 600px) {
      #upgrade-panel .panel-inner {
        padding: 8px;
      }
      .upgrade-row {
        padding: 10px;
        flex: 1 1 150px;
      }
      .upgrade-name { font-size: 14px; }
      .upgrade-pips { font-size: 16px; }
    }
    /* ── Mobile / Touch Optimizations ── */
    html {
      overscroll-behavior: none;
    }
    body.mobile {
      position: fixed;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body.mobile canvas {
      touch-action: none;
    }

    /* Rotate device overlay (portrait warning) */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #0a0e14;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: 'Share Tech Mono', monospace;
      color: #33ff66;
      text-align: center;
      padding: 40px;
    }
    .rotate-phone {
      width: 44px;
      height: 72px;
      border: 3px solid #33ff66;
      border-radius: 8px;
      position: relative;
      animation: phone-rotate 2.5s ease-in-out infinite;
    }
    .rotate-phone::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 3px;
      background: #33ff66;
      border-radius: 2px;
    }
    @keyframes phone-rotate {
      0%, 15% { transform: rotate(0deg); }
      40%, 60% { transform: rotate(90deg); }
      85%, 100% { transform: rotate(0deg); }
    }
    .rotate-text {
      font-size: 14px;
      letter-spacing: 3px;
    }
    .rotate-subtext {
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
    }

    /* Fullscreen button */
    #fullscreen-btn {
      display: none;
      position: fixed;
      bottom: 8px;
      right: 8px;
      bottom: calc(8px + env(safe-area-inset-bottom));
      right: calc(8px + env(safe-area-inset-right));
      z-index: 10000;
      background: rgba(10, 14, 20, 0.92);
      border: 1px solid rgba(51, 255, 102, 0.3);
      color: #33ff66;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 10px 14px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
    }
    #fullscreen-btn:active {
      background: rgba(51, 255, 102, 0.15);
      border-color: #33ff66;
    }
    body.mobile #fullscreen-btn {
      display: block;
    }

    /* Panel backdrop for mobile drawer */
    #panel-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 10000;
      -webkit-tap-highlight-color: transparent;
    }
    #panel-backdrop.visible { display: block; }

    /* Drawer close button */
    .drawer-close-btn {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(239, 83, 80, 0.1);
      border: 1px solid rgba(239, 83, 80, 0.3);
      color: #ef5350;
      font-size: 16px;
      width: 36px;
      height: 36px;
      line-height: 34px;
      text-align: center;
      border-radius: 4px;
      cursor: pointer;
      z-index: 10002;
      font-family: 'Share Tech Mono', monospace;
      -webkit-tap-highlight-color: transparent;
    }
    .drawer-close-btn:active {
      background: rgba(239, 83, 80, 0.25);
    }

    /* Mobile: upgrade panel as slide-out drawer */
    body.mobile #app {
      flex-direction: row;
    }
    body.mobile #upgrade-panel {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 280px;
      max-height: none;
      height: 100%;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10001;
      border-right: 1px solid rgba(51, 255, 102, 0.3);
      border-top: none;
    }
    body.mobile #upgrade-panel.drawer-open {
      transform: translateX(0);
    }
    body.mobile #upgrade-panel .panel-inner {
      width: 280px;
      height: 100%;
      max-height: none;
      display: block;
      overflow-y: auto;
      padding: 18px 16px;
    }
    body.mobile .drawer-close-btn { display: block; }
    body.mobile .upgrade-row { flex: unset; margin-bottom: 10px; }
    body.mobile #game-wrapper { width: 100vw; }

    /* Mobile callsign modal */
    body.mobile .cs-box {
      width: 90vw;
      max-width: 520px;
      padding: 32px 20px 28px;
    }
    body.mobile .cs-subheader { font-size: 18px; }
    body.mobile .cs-input-wrap,
    body.mobile .cs-prompt,
    body.mobile #callsign-input,
    body.mobile .cs-cursor { font-size: 22px; }
    body.mobile #callsign-submit { padding: 14px 32px; font-size: 14px; }

    /* ── Callsign prompt modal ── */
    #callsign-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cs-overlay {
      position: absolute;
      inset: 0;
      background: #000 url('assets/strait.jpg') center/cover no-repeat;
    }
    .cs-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }
    .cs-box {
      position: relative;
      width: 520px;
      padding: 48px 40px 36px;
      background: #0a0e14;
      border: 1px solid rgba(51, 255, 102, 0.3);
      border-radius: 6px;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }
    .cs-scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 3px
      );
    }
    .cs-header {
      font-size: 11px;
      color: #33ff66;
      letter-spacing: 4px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    .cs-subheader {
      font-family: 'Black Ops One', cursive;
      font-size: 24px;
      color: #e0e0e0;
      margin-bottom: 32px;
    }
    .cs-input-wrap {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0;
      margin-bottom: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px;
      color: #33ff66;
    }
    .cs-prompt {
      color: #33ff66;
      font-size: 28px;
    }
    #callsign-input {
      border: none;
      background: transparent;
      color: #33ff66;
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px;
      letter-spacing: 4px;
      text-transform: uppercase;
      width: 0;
      min-width: 1px;
      padding: 0;
      outline: none;
      caret-color: transparent;
    }
    #callsign-input::placeholder {
      color: transparent;
    }
    .cs-cursor {
      color: #33ff66;
      font-size: 28px;
      animation: cs-blink 0.6s step-end infinite;
    }
    @keyframes cs-blink {
      50% { opacity: 0; }
    }
    .cs-hint {
      font-size: 11px;
      color: #555;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .cs-input-wrap {
      cursor: text;
      min-width: 200px;
      padding: 6px 0;
    }
    #callsign-random {
      background: rgba(51, 255, 102, 0.05);
      border: 1px solid rgba(51, 255, 102, 0.2);
      color: #33ff66;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 8px 24px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 2px;
      margin-bottom: 16px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #callsign-random:hover {
      background: rgba(51, 255, 102, 0.12);
      border-color: rgba(51, 255, 102, 0.4);
    }
    #callsign-random:active {
      background: rgba(51, 255, 102, 0.2);
    }
    #callsign-submit {
      background: rgba(51, 255, 102, 0.1);
      border: 1px solid rgba(51, 255, 102, 0.3);
      color: #33ff66;
      font-family: 'Black Ops One', cursive;
      font-size: 16px;
      padding: 12px 36px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.15s;
    }
    #callsign-submit:hover:not(:disabled) {
      background: rgba(51, 255, 102, 0.2);
      border-color: #33ff66;
    }
    #callsign-submit:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .cs-footer {
      margin-top: 24px;
      font-size: 9px;
      color: #ef5350;
      letter-spacing: 3px;
      opacity: 0.4;
    }
    /* ── Tutorial overlay ── */
    #tutorial-overlay {
      position: fixed;
      inset: 0;
      z-index: 99998;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tut-dim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      animation: tut-dim-in 0.6s ease-out forwards;
    }
    @keyframes tut-dim-in { from { opacity: 0; } to { opacity: 1; } }
    .tut-scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(transparent 0px, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 3px);
    }
    .tut-header {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      animation: tut-header-in 0.5s ease-out 0.3s forwards;
      z-index: 2;
    }
    @keyframes tut-header-in {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .tut-header-sub {
      font-size: 9px;
      color: #33ff66;
      letter-spacing: 4px;
      opacity: 0.5;
      margin-bottom: 4px;
    }
    .tut-header-title {
      font-family: 'Black Ops One', cursive;
      font-size: 28px;
      color: #e0e0e0;
      text-shadow: 0 0 20px rgba(51, 255, 102, 0.2);
    }
    /* Content container — JS positions this to match the Phaser canvas */
    #tut-content {
      position: fixed;
      z-index: 99999;
      pointer-events: none;
    }
    .tut-route-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .tut-route-dots {
      fill: none;
      stroke: rgba(51, 255, 102, 0.12);
      stroke-width: 2;
      stroke-dasharray: 8 12;
    }
    .tut-route-line {
      fill: none;
      stroke: url(#tutRouteGrad);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 3200;
      stroke-dashoffset: 3200;
      filter: drop-shadow(0 0 6px rgba(51, 255, 102, 0.5));
      animation: tut-draw-route 2.5s ease-out 1.2s forwards;
    }
    @keyframes tut-draw-route { to { stroke-dashoffset: 0; } }
    .tut-route-tanker {
      font-size: 36px;
      filter: drop-shadow(0 0 10px rgba(255, 179, 0, 0.7));
    }
    .tut-ann-fo { overflow: visible; }
    .tut-ann {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      height: 100%;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
    }
    .tut-ann-ring-outer {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -80%);
      animation: tut-pulse 2s ease-out infinite;
    }
    @keyframes tut-pulse {
      0% { transform: translate(-50%, -80%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -80%) scale(1.8); opacity: 0; }
    }
    .tut-ann-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 6px;
    }
    .tut-ann-label {
      font-family: 'Black Ops One', cursive;
      font-size: 13px;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 2px 4px rgba(0,0,0,0.8);
    }
    .tut-ann-desc {
      font-size: 11px;
      color: #bbb;
      margin-top: 2px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      line-height: 1.3;
    }
    .tut-ann-deploy .tut-ann-ring { background: rgba(66,165,245,0.15); border: 1px solid rgba(66,165,245,0.4); }
    .tut-ann-deploy .tut-ann-ring-outer { border-color: rgba(66,165,245,0.5); }
    .tut-ann-deploy .tut-ann-label { color: #64b5f6; }
    .tut-ann-oil .tut-ann-ring { background: rgba(255,179,0,0.12); border: 1px solid rgba(255,179,0,0.35); }
    .tut-ann-oil .tut-ann-ring-outer { border-color: rgba(255,179,0,0.4); }
    .tut-ann-oil .tut-ann-label { color: #ffb300; }
    .tut-ann-exit .tut-ann-ring { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.4); }
    .tut-ann-exit .tut-ann-ring-outer { border-color: rgba(76,175,80,0.5); }
    .tut-ann-exit .tut-ann-label { color: #66bb6a; }
    .tut-ann-enemy .tut-ann-ring { background: rgba(239,83,80,0.12); border: 1px solid rgba(239,83,80,0.35); }
    .tut-ann-enemy .tut-ann-ring-outer { border-color: rgba(239,83,80,0.4); }
    .tut-ann-enemy .tut-ann-label { color: #ef5350; }
    .tut-fo-deploy .tut-ann { opacity: 0; animation: tut-ann-in 0.5s ease-out 0.8s forwards; }
    .tut-fo-oil .tut-ann    { opacity: 0; animation: tut-ann-in 0.5s ease-out 1.5s forwards; }
    .tut-fo-exit .tut-ann   { opacity: 0; animation: tut-ann-in 0.5s ease-out 2.2s forwards; }
    .tut-fo-enemy .tut-ann  { opacity: 0; animation: tut-ann-in 0.5s ease-out 2.9s forwards; }
    @keyframes tut-ann-in {
      0% { opacity: 0; transform: scale(0.7); }
      70% { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    .tut-bottom {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 2;
      opacity: 0;
      animation: tut-btn-in 0.5s ease-out 3.5s forwards;
      pointer-events: auto;
    }
    @keyframes tut-btn-in {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    #tut-begin {
      background: rgba(10, 14, 20, 0.92);
      border: 1px solid rgba(51, 255, 102, 0.4);
      color: #33ff66;
      font-family: 'Black Ops One', cursive;
      font-size: 16px;
      padding: 14px 44px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.15s;
      box-shadow: 0 0 20px rgba(51, 255, 102, 0.1);
      -webkit-tap-highlight-color: transparent;
    }
    #tut-begin:hover {
      background: rgba(51, 255, 102, 0.15);
      border-color: #33ff66;
    }
    #tut-skip {
      position: absolute;
      top: 6%;
      right: 20px;
      z-index: 2;
      font-size: 11px;
      color: #444;
      cursor: pointer;
      letter-spacing: 2px;
      opacity: 0;
      animation: tut-skip-in 0.3s ease-out 0.5s forwards;
      -webkit-tap-highlight-color: transparent;
    }
    #tut-skip:hover { color: #888; }
    @keyframes tut-skip-in { to { opacity: 1; } }
    .tut-bottom-sub {
      margin-top: 10px;
      font-size: 10px;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="upgrade-panel">
      <div class="panel-inner"></div>
    </div>
    <div id="game-wrapper"></div>
  </div>
  <!-- Mobile: rotate device overlay -->
  <div id="rotate-overlay">
    <div class="rotate-phone"></div>
    <div class="rotate-text">ROTATE DEVICE</div>
    <div class="rotate-subtext">Landscape mode required for tactical operations</div>
  </div>

  <!-- Mobile: fullscreen toggle -->
  <button id="fullscreen-btn">⤢ FULLSCREEN</button>

  <!-- Mobile: drawer backdrop -->
  <div id="panel-backdrop"></div>

  <!-- Tutorial overlay -->
  <div id="tutorial-overlay" style="display:none;">
    <div class="tut-dim"></div>
    <div class="tut-scanlines"></div>

    <!-- This container is positioned by JS to match the Phaser canvas -->
    <div id="tut-content">
      <div class="tut-header">
        <div class="tut-header-sub">CLASSIFIED // CENTCOM BRIEFING</div>
        <div class="tut-header-title">MISSION BRIEFING</div>
      </div>

      <div id="tut-skip">SKIP ▸</div>

      <svg class="tut-route-svg" viewBox="0 0 1920 1539" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="tutRouteGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#42a5f5"/>
          <stop offset="40%" stop-color="#33ff66"/>
          <stop offset="100%" stop-color="#4CAF50"/>
        </linearGradient>
        <!-- Ship route through the strait, staying in water, ending at EXIT zone -->
        <path id="tutRouteB" d="M100,850 L270,640 L500,550 L720,540 L920,420 L1120,370 L1280,450 L1420,700 L1580,770 L1750,795 L1890,1100"/>
      </defs>
      <use href="#tutRouteB" class="tut-route-dots"/>
      <use href="#tutRouteB" class="tut-route-line"/>
      <text class="tut-route-tanker" opacity="0">
        <animateMotion dur="2.5s" begin="1.2s" fill="freeze" rotate="auto">
          <mpath href="#tutRouteB"/>
        </animateMotion>
        <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="1.2s" fill="freeze"/>
        ⛽
      </text>

      <!-- Annotations in map coordinates — positions adjustable -->
      <foreignObject x="-40" y="810" width="200" height="180" class="tut-ann-fo tut-fo-deploy">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tut-ann tut-ann-deploy">
          <div class="tut-ann-ring-outer"></div>
          <div class="tut-ann-ring">⚓</div>
          <div class="tut-ann-label">DEPLOY ZONE</div>
          <div class="tut-ann-desc">Launch ships here</div>
        </div>
      </foreignObject>

      <foreignObject x="140" y="920" width="240" height="180" class="tut-ann-fo tut-fo-oil">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tut-ann tut-ann-oil">
          <div class="tut-ann-ring-outer"></div>
          <div class="tut-ann-ring">🛢️</div>
          <div class="tut-ann-label">OIL FIELDS</div>
          <div class="tut-ann-desc">Build rigs for income</div>
        </div>
      </foreignObject>

      <foreignObject x="1760" y="1060" width="200" height="180" class="tut-ann-fo tut-fo-exit">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tut-ann tut-ann-exit">
          <div class="tut-ann-ring-outer"></div>
          <div class="tut-ann-ring">🏁</div>
          <div class="tut-ann-label">EXIT ZONE</div>
          <div class="tut-ann-desc">Tankers score here</div>
        </div>
      </foreignObject>

      <foreignObject x="720" y="170" width="260" height="180" class="tut-ann-fo tut-fo-enemy">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tut-ann tut-ann-enemy">
          <div class="tut-ann-ring-outer"></div>
          <div class="tut-ann-ring">⚠️</div>
          <div class="tut-ann-label">IRGC TERRITORY</div>
          <div class="tut-ann-desc">Threats escalate over time</div>
        </div>
      </foreignObject>
    </svg>

      <div class="tut-bottom">
        <button id="tut-begin">COMMENCE OPERATIONS</button>
        <div class="tut-bottom-sub">or press ESC to skip</div>
      </div>
    </div><!-- /tut-content -->
  </div>

  <!-- Callsign prompt modal -->
  <div id="callsign-modal" style="display:none;">
    <div class="cs-overlay"></div>
    <div class="cs-box">
      <div class="cs-scanlines"></div>
      <div class="cs-header">CENTCOM PERSONNEL IDENTIFICATION</div>
      <div class="cs-subheader">ENTER YOUR CALLSIGN, ADMIRAL</div>
      <div class="cs-input-wrap"><span class="cs-prompt">&gt;</span><input id="callsign-input" type="text" maxlength="12" autocomplete="off" spellcheck="false"><span class="cs-cursor">_</span></div>
      <div class="cs-hint">3–12 CHARS • LETTERS &amp; NUMBERS ONLY</div>
      <button id="callsign-random" type="button">🎲 RANDOM CALLSIGN</button>
      <button id="callsign-submit" disabled>CONFIRM IDENTITY</button>
      <div class="cs-footer">TOP SECRET // SCI // NOFORN</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
